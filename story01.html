<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>小説本文</title>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style type="text/css">
        /* --- ここにデザインの設定を書きます --- */
        body {
            text-align: justify;
            line-height: 1.7;
            letter-spacing: 0.1em;
            margin: 0;
            font-family: メイリオ, sans-serif;
            transition: 0.3s; /* 色が変わるときにふわっとさせます */
        }

        /* 背景：白設定 */
        body.white { background-color: #fff; color: #000; }
        /* 背景：黒設定 */
        body.black { background-color: #222; color: #ccc; }

        main {
            margin: 0 auto;
            padding: 30px 20px;
            max-width: 620px;
            min-height: 100vh;
        }

        /* ボタンが並ぶエリア */
        #novel_buttons {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .toggle-btn {
            list-style: none;
            padding: 5px 15px;
            border: 1px solid #ddd;
            background: #eee;
            cursor: pointer;
            color: #333;
            margin-left: 5px;
            font-size: 14px;
            border-radius: 4px;
        }

        /* 本文エリア */
        #honbun { line-height: 2; margin-top: 30px; }
        #honbun.small { font-size: 13px; }
        #honbun.middle { font-size: 16px; }
        #honbun.large { font-size: 20px; }
        #honbun.serif { font-family: 'Noto Serif JP', serif; }
        #honbun.gothic { font-family: メイリオ, sans-serif; }

        .back-link { text-align: center; margin-top: 50px; }
        a { color: inherit; text-decoration: none; border-bottom: 1px dotted; }
    </style>

    <script>
    $(document).ready(function() {
        // --- 背景色切り替え ---
        $("#BgToggle").click(function () {
            $("body").toggleClass('black white');
        });

        // --- フォント切り替え ---
        $("#btn_font_toggle").click(function () {
            $("#honbun").toggleClass('serif gothic');
        });

        // --- サイズ切り替え ---
        var sizes = ['small', 'middle', 'large'];
        var currentSizeIdx = 1; // 最初はmiddle
        $("#btn_size_toggle").click(function () {
            currentSizeIdx = (currentSizeIdx + 1) % sizes.length;
            $("#honbun").removeClass('small middle large').addClass(sizes[currentSizeIdx]);
            $(this).text(sizes[currentSizeIdx].toUpperCase().charAt(0)); // S, M, L表示
        });
    });
    </script>
</head>

<body class="white">
<main>

    <div id="novel_buttons">
        <div id="BgToggle" class="toggle-btn" title="背景切替"><i class="fas fa-adjust"></i></div>
        <div id="btn_font_toggle" class="toggle-btn" title="書体切替">ａＡ</div>
        <div id="btn_size_toggle" class="toggle-btn" title="サイズ変更">M</div>
    </div>

    <div id="honbun" class="middle gothic">
        
        ここに小説の本文を書きます。<br>
        改行するときは「br」を入れます。<br>
        <br>
        上のボタンを押すと、背景の色や文字の大きさが変わるはずです！
        </div>

    <div class="back-link">
        <a href="short.html">短編目次へ戻る</a>
    </div>

</main>
</body>
</html>
