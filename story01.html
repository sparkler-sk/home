<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>本文</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
    $(document).ready(function() {
        // 目次で選んだ設定を反映させるだけのスクリプト
        var savedBg = sessionStorage.getItem('bg_style') || 'white';
        $("body").addClass(savedBg);
        var savedFont = sessionStorage.getItem('font_style') || 'gothic';
        $("#honbun").addClass(savedFont);
        var savedSize = sessionStorage.getItem('font_size') || 'middle';
        $("#honbun").addClass(savedSize);
    });
    </script>
    <style type="text/css">
        /* スタイルは目次と全く同じものを使用 */
        @charset "UTF-8";
        @import url('https://fonts.googleapis.com/css?family=Noto+Sans+JP|Noto+Serif+JP|Roboto&display=swap');
        * { padding: 0; margin: 0; box-sizing: border-box; }
        body { text-align: justify; word-break: break-word; line-height: 1.7; letter-spacing: 0.1em; background-color: #fff; font-size: 13px; color: #000; font-family: メイリオ, 'Noto Sans JP', sans-serif; }
        body::before { position: fixed; display: block; content: ''; top: 0; left: 0; z-index: -10000; width: 100vw; height: 100vh; background: linear-gradient(0deg, rgba(0, 0, 0, .1), rgba(0, 0, 0, .2)) center/cover; }
        main { text-align: center; margin: 3rem auto; padding: 1.5rem; max-width: 620px; }
        .black main { background-color: rgba(0,0,0,.6); color: #fff; }
        .white main { background-color: rgba(255,255,255,.6); color: #000; }
        #honbun { font-size: 14px; line-height: 2; letter-spacing: 0.025em; padding-top: 1em; text-align: left; }
        .small { font-size: 13px !important; }
        .middle { font-size: 14px !important; }
        .large { font-size: 18px !important; }
        .serif { font-family: 'Noto Serif JP', serif !important; }
        .gothic { font-family: メイリオ, sans-serif !important; }
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body id="all">
<main>
    <div class="novel">
        <div id="honbun">
            <p>
                「蓮、こっち向いて」<br>
                ここに本文を書きます。
                </p>
            <br>
            <a href="short.html">back</a>
        </div> 
    </div>
</main>
</body>
</html>
